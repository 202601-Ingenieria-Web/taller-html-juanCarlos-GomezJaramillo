<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>API - Rick and Morty</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
      <link rel="icon" type="image/png" href="./img/icons/icon-rick.png">
      <link rel="stylesheet" href="./css/style.css">
      <link rel="stylesheet" href="./css/random.css">
</head>

<body>
      <header class="header">
            <div class="container-logo">
                  <img id="img-header" src="./img/rick-morty.png" alt="imgane Rick y Morty" />
            </div>
            <div class="header-titles">
                  <h1 id="title">API - Rick and Morty</h1>
                  <h2 id="subtitle">All Characters</h2>
            </div>

            <nav class="header-nav" aria-label="Navegación principal">
                  <ul class="nav-list">
                        <li class="nav-item">
                              <a href="./index.html" class="nav-link" id="nav-characters">
                                    <span class="material-symbols--person-search-outline-rounded nav icon"></span>
                                    Characters
                              </a>
                        </li>
                        <li class="nav-item">
                              <a href="./episodes.html" class="nav-link" id="nav-episodes">
                                    <span class="material-symbols--live-tv-outline-rounded nav-icon"></span>
                                    Episodes
                              </a>
                        </li>
                  </ul>
            </nav>

      </header>

      <section class="daily-character-section" id="daily-section">

            <h4 class="daily-label">✦ Personaje del día ✦</h4>

            <div class="daily-card" id="daily-card">

                  <!-- Portal izquierdo -->
                  <div class="portal-wrapper">
                        <div class="portal-ring"></div>
                        <div class="portal-ring"></div>
                        <div class="portal-ring"></div>
                        <div class="portal-core"></div>
                        <div class="portal-skeleton" id="portal-img-slot"
                              style="width:78px;height:78px;border-radius:50%;">
                        </div>
                  </div>

                  <!-- Info derecha — botón ↻ anclado arriba a la derecha -->
                  <div class="daily-info" id="daily-info">

                        <button onclick="console.log('Click directo')" class="reload-btn" id="reload-btn" title="Nuevo personaje">
                              <span class="material-symbols--refresh"></span>
                        </button>

                        <!-- Cada elemento tiene su propio ID — el JS los actualiza sin borrar el botón -->
                        <p class="daily-name" id="daily-name">
                              <span class="portal-skeleton"
                                    style="height:20px;border-radius:6px;width:65%;display:block;"></span>
                        </p>
                        <div class="daily-badges" id="daily-badges">
                              <span class="portal-skeleton"
                                    style="height:14px;border-radius:6px;width:40%;display:block;"></span>
                        </div>
                        <p class="daily-location" id="daily-location">
                              <span class="portal-skeleton"
                                    style="height:12px;border-radius:6px;width:75%;display:block;"></span>
                        </p>

                  </div>

            </div>

      </section>

      <section class="characters-container">

            <article class="character-card">
                  <div class="card-image">

                  </div>
                  <div class="card-content">
                        <h2 class="character-name">Personaje</h2>
                  </div>
            </article>
      </section>

      <nav class="pagination" aria-labelledby="nav-pagination">
            <button id="prev-btn" onclick="changePage(-1)">
                  Anterior
            </button>
            <span id="page-number">Página 1</span>
            <button id="next-btn" onclick="changePage(1)">
                  Siguiente
            </button>
      </nav>

      <section>

      </section>

      <footer class="footer">
            <div class="container-footer">
                  <small>
                        <a href="https://rickandmortyapi.com/" target="_blank">&copy; Rick and Morty is created by
                              Justin Roiland and Dan Harmon for Adult Swim</a>
                  </small>
            </div>
      </footer>

</body>
<script src="./js/Daily.js"></script>
<script src="./js/index.js"></script>

</html>
